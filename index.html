<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Goofy Ahh Soundboard</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="app">
    <h1>Soundboard</h1>

    <section class="sound-grid">
      <button class="sound-button" data-sound="samples/Goofy_sound_1.mp3">
        <img src="images/goofy_image.png" alt="" />
        <span>goofy sound 1</span>
      </button>

      <button class="sound-button" data-sound="samples/Goofy_sound_2.mp3">
        <img src="images/goofy_image.png" alt="" />
        <span>goofy sound 2</span>
      </button>

      <button class="sound-button" data-sound="samples/Goofy_sound_3.mp3">
        <img src="images/goofy_image.png" alt="" />
        <span>goofy sound 3</span>
      </button>

      <button class="sound-button" data-sound="samples/boom.mp3">
        <img src="images/goofy_image.png" alt="" />
        <span>boom</span>
      </button>

      <button class="sound-button" data-sound="samples/Ayo_Wtf.mp3">
        <img src="images/goofy_image.png" alt="" />
        <span>ayo wtf</span>
      </button>

      <button class="sound-button" data-sound="samples/Bruh.mp3">
        <img src="images/goofy_image.png" alt="" />
        <span>bruh</span>
      </button>

      <button class="sound-button" data-sound="samples/fahh.mp3">
        <img src="images/goofy_image.png" alt="" />
        <span>fahh</span>
      </button>

      <button class="sound-button" data-sound="samples/fahh_2.mp3">
        <img src="images/goofy_image.png" alt="" />
        <span>fahh 2</span>
      </button>

      <button class="sound-button" data-sound="samples/Roblox_death.mp3">
        <img src="images/goofy_image.png" alt="" />
        <span>roblox death</span>
      </button>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
